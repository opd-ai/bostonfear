# BostonFear - Item Asset Pipeline
# Purpose: Generate item cards and equipment illustrations
# Last updated: 2026-05-19
#
# Usage:
#   asset-generator pipeline --file assets/items.yaml
#
# Output: output/items/
# Resolution: 256x256 (item icons/cards)

assets:
  # Common Items
  - name: Common Items
    output_dir: output/items/common
    seed_offset: 20000
    width: 256
    length: 256
    steps: 40
    
    metadata:
      style: "item illustration, detailed object art, game asset"
      era: "1920s period appropriate"
      quality: "high detail, sharp focus, clear object, centered composition"
      negative: "blurry, low quality, multiple objects, cluttered, text, watermark"
    
    assets:
      - id: item_flashlight
        name: "Flashlight"
        prompt: "vintage brass flashlight, 1920s design, detailed metal work"
        filename: "flashlight.png"
      
      - id: item_knife
        name: "Pocket Knife"
        prompt: "folding pocket knife, worn handle, utilitarian blade"
        filename: "pocket_knife.png"
      
      - id: item_matches
        name: "Matches"
        prompt: "box of safety matches, vintage matchbook, period design"
        filename: "matches.png"
      
      - id: item_rope
        name: "Rope"
        prompt: "coiled hemp rope, weathered natural fiber rope"
        filename: "rope.png"
      
      - id: item_bandages
        name: "Medical Bandages"
        prompt: "rolled medical bandages, first aid supplies, white gauze"
        filename: "bandages.png"
      
      - id: item_cigarettes
        name: "Cigarettes"
        prompt: "pack of cigarettes, 1920s packaging, vintage tobacco"
        filename: "cigarettes.png"
      
      - id: item_flask
        name: "Hip Flask"
        prompt: "silver hip flask, engraved metal, vintage liquor flask"
        filename: "hip_flask.png"
      
      - id: item_notebook
        name: "Notebook"
        prompt: "leather-bound notebook, aged paper, investigator's journal"
        filename: "notebook.png"
      
      - id: item_compass
        name: "Compass"
        prompt: "brass compass, antique navigation tool, detailed metalwork"
        filename: "compass.png"
      
      - id: item_watch
        name: "Pocket Watch"
        prompt: "gold pocket watch, chain attached, roman numerals, vintage timepiece"
        filename: "pocket_watch.png"

  # Weapons
  - name: Weapons
    output_dir: output/items/weapons
    seed_offset: 21000
    width: 256
    length: 256
    steps: 40
    
    metadata:
      style: "weapon illustration, detailed object art, game asset"
      era: "1920s period weapons"
      quality: "high detail, sharp focus, clear weapon, centered composition"
      negative: "blurry, low quality, modern, futuristic, text, watermark"
    
    assets:
      - id: weapon_revolver
        name: "Revolver"
        prompt: "1920s revolver pistol, detailed cylinder, wooden grip"
        filename: "revolver.png"
      
      - id: weapon_shotgun
        name: "Shotgun"
        prompt: "double barrel shotgun, wooden stock, vintage hunting gun"
        filename: "shotgun.png"
      
      - id: weapon_rifle
        name: "Rifle"
        prompt: "bolt action rifle, period military weapon, detailed metalwork"
        filename: "rifle.png"
      
      - id: weapon_tommygun
        name: "Tommy Gun"
        prompt: "thompson submachine gun, gangster era weapon, drum magazine"
        filename: "tommy_gun.png"
      
      - id: weapon_crowbar
        name: "Crowbar"
        prompt: "steel crowbar, worn metal tool, improvised weapon"
        filename: "crowbar.png"
      
      - id: weapon_axe
        name: "Fire Axe"
        prompt: "fire axe, red painted head, wooden handle, emergency tool"
        filename: "fire_axe.png"
      
      - id: weapon_bat
        name: "Baseball Bat"
