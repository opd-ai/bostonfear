# BostonFear - Enemy/Creature Asset Pipeline
# Purpose: Generate enemy and creature portraits for encounters
# Last updated: 2026-05-19
#
# Usage:
#   asset-generator pipeline --file assets/enemies.yaml
#
# Output: output/enemies/
# Resolution: 512x512 (creature portraits)

assets:
  # Cultist Enemies
  - name: Cultist Enemies
    output_dir: output/enemies/cultists
    seed_offset: 10000
    width: 512
    length: 512
    steps: 40
    
    metadata:
      style: "gothic horror enemy portrait, menacing, detailed character art"
      mood: "threatening and sinister, supernatural evil"
      quality: "high detail, sharp focus, professional character art"
      negative: "blurry, low quality, deformed, text, watermark"
    
    assets:
      - id: enemy_cultist_01
        name: "Hooded Cultist"
        prompt: "hooded cultist in dark robes, shadowed face, ritual markings, sinister pose"
        filename: "hooded_cultist.png"
      
      - id: enemy_cultist_02
        name: "Ritual Leader"
        prompt: "cult leader with ceremonial robes, occult symbols, commanding presence"
        filename: "ritual_leader.png"
      
      - id: enemy_cultist_03
        name: "Masked Devotee"
        prompt: "cultist wearing ceremonial mask, dark robes, ritual implements"
        filename: "masked_devotee.png"
      
      - id: enemy_cultist_04
        name: "Corrupted Priest"
        prompt: "corrupted religious figure, tattered vestments, mad expression"
        filename: "corrupted_priest.png"
      
      - id: enemy_cultist_05
        name: "Acolyte"
        prompt: "young cult acolyte, dark clothing, zealous expression, ritual dagger"
        filename: "acolyte.png"

