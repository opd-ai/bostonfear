# BostonFear - Location Asset Pipeline
# Purpose: Generate location background sprites for all game modules
# Last updated: 2026-05-19
#
# Usage:
#   make assets-locations
#   asset-generator pipeline --file assets/locations.yaml
#
# Output: output/locations/
# Resolution: 1024x768 (landscape backgrounds)

assets:
  # Arkham Horror Locations
  - name: Arkham Horror - Core Neighborhoods
    output_dir: output/locations/arkhamhorror
    seed_offset: 5000
    width: 1024
    length: 768
    steps: 40
    
    metadata:
      style: "1920s New England town location, atmospheric, moody lighting, detailed environment art"
      era: "1920s architecture and styling"
      mood: "mysterious and ominous, supernatural undertones"
      view: "establishing shot, isometric or slight angle view"
      quality: "high detail, sharp focus, professional environment art"
      negative: "blurry, low quality, modern elements, cars, people, text, watermark"
    
    assets:
      - id: loc_downtown
        name: downtown
        prompt: "1920s downtown business district, brick buildings, streetlamps, foggy evening atmosphere, New England town"
        filename: "downtown.png"
      
      - id: loc_university
        name: university
        prompt: "old university campus, ivy-covered academic buildings, gothic architecture, library tower, autumn evening"
        filename: "university.png"
      
      - id: loc_rivertown
        name: rivertown
        prompt: "riverside dock district, old warehouses, river waterfront, wooden piers, misty docks, industrial area"
        filename: "rivertown.png"
      
      - id: loc_northside
        name: northside
        prompt: "residential neighborhood, victorian houses, tree-lined streets, quiet suburban area, twilight atmosphere"
        filename: "northside.png"

