        filename: "underground_tunnel.png"
      
      - id: event_loc_06
        name: "Rooftop Chase"
        prompt: "running across rooftops, urban skyline, desperate escape"
        filename: "rooftop_chase.png"

  # Resolution Moments
  - name: Resolution Moments
    output_dir: output/events/resolutions
    seed_offset: 43000
    width: 800
    length: 600
    steps: 40
    
