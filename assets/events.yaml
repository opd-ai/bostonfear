# BostonFear - Event/Story Illustration Pipeline
# Purpose: Generate story moment and event illustrations
# Last updated: 2026-05-19
#
# Usage:
#   asset-generator pipeline --file assets/events.yaml
#
# Output: output/events/
# Resolution: 800x600 (story card format)

assets:
  # Investigation Events
  - name: Investigation Events
    output_dir: output/events/investigation
    seed_offset: 40000
    width: 800
    length: 600
    steps: 40
    
    metadata:
      style: "story illustration, narrative scene, detailed environment art"
      era: "1920s period appropriate"
      mood: "mysterious and investigative, noir atmosphere"
      quality: "high detail, cinematic composition, professional illustration"
      negative: "blurry, low quality, text, UI elements, watermark"
    
    assets:
      - id: event_inv_01
        name: "Library Research"
        prompt: "dim library interior, stacks of ancient books, investigator studying by lamplight"
        filename: "library_research.png"
      
      - id: event_inv_02
        name: "Crime Scene"
        prompt: "mysterious crime scene, chalk outline, dramatic investigation lighting"
        filename: "crime_scene.png"
      
      - id: event_inv_03
        name: "Secret Meeting"
        prompt: "clandestine meeting in shadowy corner, conspiratorial atmosphere"
        filename: "secret_meeting.png"
      
      - id: event_inv_04
        name: "Document Discovery"
        prompt: "finding hidden documents, old papers and photographs, revelation moment"
        filename: "document_discovery.png"
      
      - id: event_inv_05
        name: "Interrogation"
        prompt: "tense questioning scene, dramatic lighting, confrontation atmosphere"
        filename: "interrogation.png"
      
      - id: event_inv_06
        name: "Following Suspect"
        prompt: "shadowy figure being tailed, urban pursuit, noir stalking scene"
        filename: "following_suspect.png"

  # Supernatural Encounters
  - name: Supernatural Encounters
    output_dir: output/events/supernatural
    seed_offset: 41000
    width: 800
    length: 600
    steps: 40
    
    metadata:
      style: "horror illustration, supernatural scene, detailed environment art"
      mood: "terrifying and otherworldly, cosmic horror"
      quality: "high detail, cinematic composition, professional illustration"
      negative: "blurry, low quality, text, UI elements, watermark"
    
    assets:
      - id: event_sup_01
        name: "Ritual Discovery"
        prompt: "stumbling upon active ritual, candles and symbols, cultist ceremony"
        filename: "ritual_discovery.png"
      
      - id: event_sup_02
        name: "Ghost Manifestation"
        prompt: "spectral apparition appearing, ghostly figure, supernatural encounter"
        filename: "ghost_manifestation.png"
      
      - id: event_sup_03
        name: "Tentacle Horror"
        prompt: "tentacles emerging from darkness, cosmic horror reveal, lovecraftian moment"
        filename: "tentacle_horror.png"
      
      - id: event_sup_04
        name: "Reality Distortion"
        prompt: "reality warping around investigator, walls bending, dimensional distortion"
        filename: "reality_distortion.png"
      
      - id: event_sup_05
        name: "Possession Moment"
        prompt: "person being possessed, supernatural takeover, horror transformation"
        filename: "possession_moment.png"
      
      - id: event_sup_06
        name: "Nightmare Vision"
        prompt: "surreal nightmare landscape, dreamlike horror, psychological terror"
        filename: "nightmare_vision.png"

  # Location-Specific Events
  - name: Location Events
    output_dir: output/events/locations
