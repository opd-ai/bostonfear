    assets:
      - id: event_loc_01
        name: "Museum After Hours"
        prompt: "empty museum at night, artifacts in shadows, isolated guard station"
        filename: "museum_after_hours.png"
      
      - id: event_loc_02
        name: "Abandoned Ward"
        prompt: "derelict hospital ward, empty beds, eerie medical equipment"
        filename: "abandoned_ward.png"
      
      - id: event_loc_03
        name: "Dockside Smuggling"
