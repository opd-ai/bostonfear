<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arkham Horror — Web Client</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a12;
      color: #ccc;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    h1 { font-size: 1.1rem; margin-bottom: 8px; color: #8af; }
    #status { font-size: 0.8rem; margin-bottom: 8px; color: #888; }
    canvas { border: 1px solid #333; }
  </style>
</head>
<body>
  <h1>Arkham Horror — Ebitengine Web Client</h1>
  <div id="status">Loading…</div>
  <!-- wasm_exec.js is copied from GOROOT/misc/wasm/wasm_exec.js at build time -->
  <script src="wasm_exec.js"></script>
  <script>
    const go = new Go();
    WebAssembly.instantiateStreaming(fetch('game.wasm'), go.importObject)
      .then(result => {
        document.getElementById('status').textContent = 'Connected';
        go.run(result.instance);
      })
      .catch(err => {
        document.getElementById('status').textContent = 'Load error: ' + err;
        console.error(err);
      });
  </script>
</body>
</html>
