<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkham Horror - Multiplayer Web Game</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }

        .game-board {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #8B4513;
            border-radius: 10px;
            padding: 20px;
        }

        .game-title {
            text-align: center;
            color: #DAA520;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .game-canvas {
            border: 3px solid #8B4513;
            border-radius: 5px;
            background: #2F4F4F;
            display: block;
            margin: 0 auto;
        }

        .sidebar {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #8B4513;
            border-radius: 10px;
            padding: 20px;
            height: fit-content;
        }

        .section {
            margin-bottom: 25px;
        }

        .section h3 {
            color: #DAA520;
            border-bottom: 2px solid #8B4513;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .player-info {
            background: rgba(139, 69, 19, 0.2);
            border: 1px solid #8B4513;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .player-info.current-player {
            border-color: #DAA520;
            background: rgba(218, 165, 32, 0.2);
            box-shadow: 0 0 10px rgba(218, 165, 32, 0.5);
        }

        .resource-bar {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .resource-value {
            font-weight: bold;
            color: #DAA520;
        }

        .doom-counter {
            text-align: center;
            background: rgba(139, 0, 0, 0.4);
            border: 2px solid #8B0000;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .doom-counter.critical {
            animation: pulse 2s infinite;
            border-color: #FF0000;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .action-btn {
            background: linear-gradient(135deg, #8B4513, #A0522D);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #A0522D, #CD853F);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .action-btn:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .location-select {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            background: #2F4F4F;
            color: white;
            border: 1px solid #8B4513;
            border-radius: 3px;
        }

        .status-display {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #8B4513;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .status-waiting {
            color: #DAA520;
        }

        .status-playing {
            color: #90EE90;
        }

        .status-ended {
            color: #FF6347;
            font-weight: bold;
        }

        .dice-result {
            background: rgba(70, 130, 180, 0.3);
            border: 1px solid #4682B4;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
        }

        .dice-result .dice-roll {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin: 5px 0;
        }

        .dice-face {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }

        .dice-success {
            background: #228B22;
            color: white;
        }

        .dice-blank {
            background: #696969;
            color: white;
        }

        .dice-tentacle {
            background: #8B0000;
            color: white;
        }

        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
        }

        .connection-connected {
            background: #228B22;
            color: white;
        }

        .connection-disconnected {
            background: #8B0000;
            color: white;
        }

        .connection-reconnecting {
            background: #DAA520;
            color: black;
        }

        .win-condition {
            background: linear-gradient(135deg, #228B22, #32CD32);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;
            margin: 20px 0;
        }

        .lose-condition {
            background: linear-gradient(135deg, #8B0000, #DC143C);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="connection-status" id="connectionStatus">Connecting...</div>
    
    <div class="container">
        <div class="game-board">
            <h1 class="game-title">Arkham Horror</h1>
            <canvas id="gameCanvas" class="game-canvas" width="800" height="600"></canvas>
        </div>
        
        <div class="sidebar">
            <div class="section">
                <div class="status-display" id="gameStatus">
                    <span id="gamePhase">Waiting for players...</span>
                </div>
            </div>

            <div class="section">
                <div class="doom-counter" id="doomCounter">
                    <h3>Doom Counter</h3>
                    <div style="font-size: 2em; font-weight: bold;" id="doomValue">0</div>
                    <div style="font-size: 0.9em;">/ 12</div>
                </div>
            </div>

            <div class="section" id="playersSection">
                <h3>Investigators</h3>
                <div id="playersList"></div>
            </div>

            <div class="section" id="actionsSection">
                <h3>Actions</h3>
                <div class="actions">
                    <button class="action-btn" id="moveBtn" onclick="selectMoveAction()">Move</button>
                    <button class="action-btn" id="gatherBtn" onclick="performAction('gather')">Gather</button>
                    <button class="action-btn" id="investigateBtn" onclick="performAction('investigate')">Investigate</button>
                    <button class="action-btn" id="wardBtn" onclick="performAction('ward')">Cast Ward</button>
                </div>
                
                <select class="location-select" id="locationSelect" style="display: none;">
                    <option value="">Select location...</option>
                    <option value="Downtown">Downtown</option>
                    <option value="University">University</option>
                    <option value="Rivertown">Rivertown</option>
                    <option value="Northside">Northside</option>
                </select>
                
                <button class="action-btn" id="confirmMoveBtn" style="display: none;" onclick="confirmMove()">Confirm Move</button>
            </div>

            <div class="section" id="diceSection">
                <h3>Latest Dice Roll</h3>
                <div id="diceResult"></div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
