name: Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Run monthly on the 1st at 00:00 UTC to catch new CVEs
    - cron: '0 0 1 * *'

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      
      - name: Run govulncheck
        run: govulncheck ./...
      
      - name: Scan results
        if: failure()
        run: |
          echo "::error::Vulnerability scan failed - dependencies have known vulnerabilities"
          echo "Review the govulncheck output above for details"
          echo "Update vulnerable dependencies with: go get -u <package>@latest"
          exit 1
