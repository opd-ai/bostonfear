name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      # Ebitengine requires X11/GL development headers for compilation and vetting.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev xvfb
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: DISPLAY=:99 xvfb-run -a go test -race -tags=requires_display ./...
      # Run performance benchmarks and upload results as a CI artifact.
      # A broadcast latency > 200ms average is treated as a regression warning.
      - name: Run benchmarks
        run: go test -bench=. -benchtime=10s -run='^$' ./cmd/server/... | tee /tmp/benchmark-results.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: /tmp/benchmark-results.txt

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      # Server and desktop builds require C libraries for Ebitengine.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - name: Build server
        run: go build ./cmd/server
      - name: Build desktop
        run: go build ./cmd/desktop
      - name: Build web (WASM)
        run: GOOS=js GOARCH=wasm go build -o /dev/null ./cmd/web
