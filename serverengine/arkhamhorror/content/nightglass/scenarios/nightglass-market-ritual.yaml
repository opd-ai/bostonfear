schemaVersion: "1.0.0"
contentPackId: "nightglass.core"
language: "en-US"
generatedAt: "2026-05-15T00:00:00Z"
records:
  - id: "scn.nightglass.market-ritual"
    name: "Market Ritual"
    summary: "Disrupt a forbidden summoning before midnight marketplace transforms."
    enabled: true
    version: 1
    default: false
    narrativePremise: "Cultists at Ash Market prepare a mass summoning. Investigators must gather ritual components, identify key participants, and disrupt the ceremony before the market becomes a permanent gateway."
    dependencies:
      requiredLocationIds:
        - "loc.blackwater-docks"
        - "loc.mirror-square"
        - "loc.lantern-row"
        - "loc.old-reservoir"
        - "loc.bell-tower"
        - "loc.ash-market"
        - "loc.salt-archive"
        - "loc.north-breakwater"
      requiredResourceIds:
        - "res.vitality"
        - "res.composure"
        - "res.leads"
        - "res.focus"
        - "res.salvage"
        - "res.ward-charge"
        - "res.nightfall"
      requiredThreatIds:
        - "thr.gutter-maw"
        - "thr.bell-widow"
        - "thr.breakwater-hulk"
        - "thr.rift-sleet"
      requiredEncounterIds:
        - "enc.omen-low-tide"
        - "enc.omen-lantern-gale"
        - "enc.omen-archive-hum"
        - "enc.crisis-anchor-slip"
        - "enc.breakwater-signal-burst"
    setup:
      playerCount: {min: 1, max: 6}
      startingLocationsByPlayerCount:
        "1": ["loc.ash-market"]
        "2": ["loc.ash-market", "loc.lantern-row"]
        "3": ["loc.ash-market", "loc.lantern-row", "loc.ash-market"]
        "4": ["loc.ash-market", "loc.lantern-row", "loc.mirror-square", "loc.ash-market"]
        "5": ["loc.ash-market", "loc.lantern-row", "loc.mirror-square", "loc.ash-market", "loc.lantern-row"]
        "6": ["loc.ash-market", "loc.lantern-row", "loc.mirror-square", "loc.ash-market", "loc.lantern-row", "loc.mirror-square"]
      startingResources: {res.vitality: 8, res.composure: 7, res.leads: 2, res.focus: 1, res.salvage: 1}
      startingGlobalResources: {res.nightfall: 0, res.ward-charge: 1}
      initialThreatSpawns:
        - when: "always"
          threatId: "thr.gutter-maw"
          locationId: "loc.ash-market"
          count: 2
        - when: "players>=5"
          threatId: "thr.pier-hound"
          locationId: "loc.lantern-row"
          count: 1
    phaseFlow:
      - phaseId: "coordination"
        description: "Reveal ritual progression and cultist activity."
      - phaseId: "investigatorTurns"
        description: "Each investigator performs exactly two actions in turn order."
      - phaseId: "escalation"
        description: "Advance ritual timer, spawn reinforcements, resolve crisis."
    actions:
      available: ["move", "scavenge", "survey", "seal", "confront"]
      perTurnLimit: 2
      definitions:
        move: {testStat: "finesse", threshold: 1}
        scavenge: {testStat: "wit", threshold: 2}
        survey: {testStat: "wit", thresholdByDifficulty: {easy: 2, standard: 2, hard: 3}}
        seal:
          testStat: "composure"
          thresholdByDifficulty: {easy: 2, standard: 3, hard: 3}
          costByDifficulty:
            easy: {res.leads: 2, res.composure: 0}
            standard: {res.leads: 2, res.composure: 1}
            hard: {res.leads: 3, res.composure: 2}
          onSuccess: [{effectType: "gainResource", params: {resourceId: "res.ward-charge", amount: 1}}]
        confront: {testStat: "force", thresholdByDifficulty: {easy: 2, standard: 2, hard: 3}}
      fractureRule:
        description: "Each fracture result increases global nightfall by 1 regardless of action success."
        globalResourceId: "res.nightfall"
        amountPerFracture: 1
    escalation:
      steps:
        - {effectType: "changeGlobal", params: {resourceId: "res.nightfall", amountFrom: "difficulty.escalationRate"}}
        - {effectType: "spawnByNightfallTier", params: {tableId: "tbl.market-ritual.spawns"}}
        - {effectType: "resolveEncounter", params: {deck: "crisis", count: 1}}
        - {effectType: "conditionalSpawn", params: {ifFlag: "fracturesThisRound>=2", threatId: "thr.tar-echo", count: 1}}
      spawnTable:
        id: "tbl.market-ritual.spawns"
        tiers:
          - minNightfall: 0
            maxNightfall: 4
            options: [{threatId: "thr.gutter-maw", weight: 4}, {threatId: "thr.pier-hound", weight: 1}]
          - minNightfall: 5
            maxNightfall: 8
            options: [{threatId: "thr.tar-echo", weight: 3}, {threatId: "thr.bell-widow", weight: 2}]
          - minNightfall: 9
            maxNightfall: 12
            options: [{threatId: "thr.breakwater-hulk", weight: 3}, {threatId: "thr.rift-sleet", weight: 2}]
    difficulty:
      easy:
        escalationRate: 1
        surveyThreshold: 2
        sealLeadCost: 2
        threatHealthScalar: 0.8
        victoryWardTarget: 3
      standard:
        escalationRate: 2
        surveyThreshold: 2
        sealLeadCost: 2
        threatHealthScalar: 1.0
        victoryWardTarget: 4
      hard:
        escalationRate: 3
        surveyThreshold: 3
        sealLeadCost: 3
        threatHealthScalar: 1.2
        victoryWardTarget: 5
    objectives:
      primary:
        - id: "obj.ritual-disruption"
          description: "Gather ward charges to disrupt summoning."
          completion: {resourceId: "res.ward-charge", gteFrom: "difficulty.victoryWardTarget"}
        - id: "obj.cultist-confrontation"
          description: "Defeat lead cultists at Ash Market."
          completion:
            actionId: "act.signal-sever"
            locationId: "loc.ash-market"
            teamLeadsByPlayerCount: {"1": 3, "2": 4, "3": 5, "4": 6, "5": 7, "6": 8}
    victoryConditions:
      allOf: ["obj.ritual-disruption", "obj.cultist-confrontation"]
    defeatConditions:
      anyOf:
        - {resourceId: "res.nightfall", gte: 12, reason: "The summoning completes and transforms the market."}
        - {flag: "allInvestigatorsIncapacitated", equals: true, reason: "All investigators overwhelmed by cultists."}
        - {flag: "resonanceBreach", gte: 3, reason: "Ritual containment fails."}
    fallbackBehavior:
      ifMissingScenarioId: "load serverengine/arkhamhorror/content/nightglass/scenarios/index.yaml defaultScenarioId"
      ifInvalidScenarioId: "log warning and load serverengine/arkhamhorror/content/nightglass/scenarios/index.yaml defaultScenarioId"
      ifIndexDefaultMissing: "load first enabled scenario sorted by ID"
      ifNoEnabledScenarios: "abort startup with content validation error"
