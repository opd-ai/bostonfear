schemaVersion: "1.0.0"
contentPackId: "nightglass.core"
language: "en-US"
generatedAt: "2026-05-09T00:00:00Z"
records:
  - id: "scn.nightglass.harbor-signal"
    name: "Harbor Signal"
    summary: "A deepwater beacon transmits impossible tones that pull living shadows inland."
    enabled: true
    version: 1
    default: true
    narrativePremise: "Investigators must map signal anchors, stabilize ward points, and sever resonance before Brindlehaven collapses into mirrored tides."
    dependencies:
      requiredLocationIds:
        - "loc.blackwater-docks"
        - "loc.mirror-square"
        - "loc.lantern-row"
        - "loc.old-reservoir"
        - "loc.bell-tower"
        - "loc.ash-market"
        - "loc.salt-archive"
        - "loc.north-breakwater"
      requiredResourceIds:
        - "res.vitality"
        - "res.composure"
        - "res.leads"
        - "res.focus"
        - "res.salvage"
        - "res.ward-charge"
        - "res.nightfall"
      requiredThreatIds:
        - "thr.gutter-maw"
        - "thr.bell-widow"
        - "thr.breakwater-hulk"
        - "thr.rift-sleet"
      requiredEncounterIds:
        - "enc.omen-low-tide"
        - "enc.omen-lantern-gale"
        - "enc.omen-archive-hum"
        - "enc.crisis-anchor-slip"
        - "enc.breakwater-signal-burst"
    setup:
      playerCount: {min: 1, max: 6}
      startingLocationsByPlayerCount:
        "1": ["loc.mirror-square"]
        "2": ["loc.mirror-square", "loc.mirror-square"]
        "3": ["loc.mirror-square", "loc.lantern-row", "loc.mirror-square"]
        "4": ["loc.mirror-square", "loc.lantern-row", "loc.mirror-square", "loc.lantern-row"]
        "5": ["loc.mirror-square", "loc.lantern-row", "loc.blackwater-docks", "loc.mirror-square", "loc.lantern-row"]
        "6": ["loc.mirror-square", "loc.lantern-row", "loc.blackwater-docks", "loc.mirror-square", "loc.lantern-row", "loc.blackwater-docks"]
      startingResources: {res.vitality: 8, res.composure: 8, res.leads: 1, res.focus: 1, res.salvage: 0}
      startingGlobalResources: {res.nightfall: 1, res.ward-charge: 0}
      initialThreatSpawns:
        - when: "always"
          threatId: "thr.gutter-maw"
          locationId: "loc.blackwater-docks"
          count: 1
        - when: "players>=4"
          threatId: "thr.sump-giant"
          locationId: "loc.old-reservoir"
          count: 1
    phaseFlow:
      - phaseId: "coordination"
        description: "Reveal one omen encounter and apply start-of-round conditions."
      - phaseId: "investigatorTurns"
        description: "Each investigator performs exactly two actions in turn order."
      - phaseId: "escalation"
        description: "Increase pressure, spawn threats, and resolve one crisis encounter."
    actions:
      available: ["move", "scavenge", "survey", "seal", "confront"]
      perTurnLimit: 2
      definitions:
        move: {testStat: "finesse", threshold: 1}
        scavenge: {testStat: "wit", threshold: 1}
        survey: {testStat: "wit", thresholdByDifficulty: {easy: 1, standard: 2, hard: 3}}
        seal:
          testStat: "composure"
          thresholdByDifficulty: {easy: 2, standard: 2, hard: 3}
          costByDifficulty:
            easy: {res.leads: 1, res.composure: 0}
            standard: {res.leads: 2, res.composure: 1}
            hard: {res.leads: 2, res.composure: 2}
          onSuccess: [{effectType: "gainResource", params: {resourceId: "res.ward-charge", amount: 1}}]
        confront: {testStat: "force", thresholdByDifficulty: {easy: 1, standard: 2, hard: 2}}
      fractureRule:
        description: "Each fracture result increases global nightfall by 1 regardless of action success."
        globalResourceId: "res.nightfall"
        amountPerFracture: 1
    escalation:
      steps:
        - {effectType: "changeGlobal", params: {resourceId: "res.nightfall", amountFrom: "difficulty.escalationRate"}}
        - {effectType: "spawnByNightfallTier", params: {tableId: "tbl.harbor-signal.spawns"}}
        - {effectType: "resolveEncounter", params: {deck: "crisis", count: 1}}
        - {effectType: "conditionalSpawn", params: {ifFlag: "fracturesThisRound>=3", threatId: "thr.rift-sleet", count: 1}}
      spawnTable:
        id: "tbl.harbor-signal.spawns"
        tiers:
          - minNightfall: 0
            maxNightfall: 4
            options: [{threatId: "thr.gutter-maw", weight: 3}, {threatId: "thr.hollow-choir", weight: 2}]
          - minNightfall: 5
            maxNightfall: 8
            options: [{threatId: "thr.pier-hound", weight: 3}, {threatId: "thr.tar-echo", weight: 2}, {threatId: "thr.bell-widow", weight: 2}]
          - minNightfall: 9
            maxNightfall: 12
            options: [{threatId: "thr.breakwater-hulk", weight: 3}, {threatId: "thr.rift-sleet", weight: 2}, {threatId: "thr.sump-giant", weight: 2}]
    difficulty:
      easy:
        escalationRate: 1
        surveyThreshold: 1
        sealLeadCost: 1
        threatHealthScalar: 0.8
        victoryWardTarget: 4
      standard:
        escalationRate: 2
        surveyThreshold: 2
        sealLeadCost: 2
        threatHealthScalar: 1.0
        victoryWardTarget: 5
      hard:
        escalationRate: 3
        surveyThreshold: 3
        sealLeadCost: 2
        threatHealthScalar: 1.25
        victoryWardTarget: 6
    objectives:
      primary:
        - id: "obj.anchor-stabilization"
          description: "Reach target ward-charge based on selected difficulty."
          completion: {resourceId: "res.ward-charge", gteFrom: "difficulty.victoryWardTarget"}
        - id: "obj.signal-sever"
          description: "Perform Signal Sever at North Breakwater with team lead threshold by player count."
          completion:
            actionId: "act.signal-sever"
            locationId: "loc.north-breakwater"
            teamLeadsByPlayerCount: {"1": 3, "2": 3, "3": 5, "4": 5, "5": 7, "6": 7}
    victoryConditions:
      allOf: ["obj.anchor-stabilization", "obj.signal-sever"]
    defeatConditions:
      anyOf:
        - {resourceId: "res.nightfall", gte: 12, reason: "Nightfall overtakes Brindlehaven."}
        - {flag: "allInvestigatorsIncapacitated", equals: true, reason: "No investigator remains active."}
        - {flag: "resonanceBreach", gte: 3, reason: "Critical anchor failures collapse the ward network."}
    fallbackBehavior:
      ifMissingScenarioId: "load serverengine/arkhamhorror/content/nightglass/scenarios/index.yaml defaultScenarioId"
      ifInvalidScenarioId: "log warning and load serverengine/arkhamhorror/content/nightglass/scenarios/index.yaml defaultScenarioId"
      ifIndexDefaultMissing: "load first enabled scenario sorted by ID"
      ifNoEnabledScenarios: "abort startup with content validation error"
