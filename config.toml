# BostonFear configuration template (TOML)
# Required fields:
# - server.game (if omitted defaults to "arkhamhorror")
# Optional fields:
# - desktop.server
# - web.server
# - network.allowed_origins

[server]
# Game module key loaded by the server command.
# Options currently registered: arkhamhorror, eldersign, eldritchhorror, finalhour
game = "arkhamhorror"

# Optional full listen address. If set, it takes precedence over host/port.
# Example: ":8080" or "127.0.0.1:8080"
listen = ""

# Optional host/port listener settings used when server.listen is not set.
# Empty host means all interfaces.
host = ""
port = 8080

[desktop]
# WebSocket server URL used by the desktop client command.
server = "ws://localhost:8080/ws"

[web]
# Optional override for WASM client command. If empty, browser origin is used.
server = ""

[network]
# Optional allow-list used by the server to validate WebSocket upgrade origins.
# Keep empty to allow any origin for local development.
allowed_origins = []
